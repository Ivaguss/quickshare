<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="/manifest.webmanifest" />
<title>QuickShare — обмен между устройствами</title>
<style>
  :root {
    --bg: #0b0f1a;
    --bg2: #131a2b;
    --card: #182035;
    --card2: #1e2740;
    --text: #e8ecf6;
    --muted: #8b95ad;
    --accent: #5b8cff;
    --accent2: #7aa2ff;
    --border: #26304d;
    --danger: #ff6b6b;
    --ok: #4ade80;
    --shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f5fb; --bg2: #e9eef8; --card: #ffffff; --card2: #f4f7fd;
      --text: #16203a; --muted: #6a7691; --accent: #2f6bff; --accent2: #1f5aff;
      --border: #dde4f1; --shadow: 0 8px 24px rgba(30,50,90,.10);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; min-height: 100%;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button { font: inherit; cursor: pointer; border: none; border-radius: 12px; }

  /* ── Экран входа ── */
  #join { margin: auto; width: min(92vw, 420px); text-align: center; padding: 24px; }
  #join h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -.5px; }
  #join p { color: var(--muted); margin: 0 0 22px; }
  .field { display: flex; gap: 8px; margin-bottom: 12px; }
  .field input {
    flex: 1; padding: 14px 16px; font-size: 18px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    outline: none; text-align: center; letter-spacing: 2px; text-transform: uppercase;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent); color: #fff; padding: 14px 18px; font-weight: 600; font-size: 16px;
  }
  .btn:active { transform: scale(.98); }
  .btn.ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn.block { width: 100%; }
  .hint { color: var(--muted); font-size: 13px; margin-top: 14px; }

  /* ── Шапка ── */
  header {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5;
  }
  header .room { font-weight: 700; font-size: 17px; letter-spacing: 1px; }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
  header .dot.on { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  header .spacer { flex: 1; }
  .iconbtn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    width: 40px; height: 40px; display: grid; place-items: center; font-size: 18px;
  }
  .iconbtn:active { transform: scale(.94); }
  .count { color: var(--muted); font-size: 13px; }

  /* ── Лента ── */
  main { flex: 1; overflow-y: auto; padding: 14px 14px 4px; -webkit-overflow-scrolling: touch; }
  #list { display: flex; flex-direction: column-reverse; gap: 10px; max-width: 760px; margin: 0 auto; }
  .empty { text-align: center; color: var(--muted); margin-top: 18vh; padding: 0 20px; }
  .empty .big { font-size: 40px; margin-bottom: 10px; }

  .item {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 12px 14px; box-shadow: var(--shadow); word-break: break-word; overflow: hidden;
    animation: pop .18s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .item .txt { white-space: pre-wrap; font-size: 16px; }
  .item .txt a { color: var(--accent2); }
  .item .row { display: flex; align-items: center; gap: 10px; }
  .item .fileicon { font-size: 26px; flex: none; }
  .item .meta { flex: 1; min-width: 0; }
  .item .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .item img.thumb { max-width: 100%; max-height: 320px; border-radius: 10px; margin-top: 8px; display: block; }
  .item .actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .chip {
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    padding: 7px 12px; font-size: 13px; border-radius: 10px; font-weight: 500;
  }
  .chip.danger { color: var(--danger); }
  .chip:active { transform: scale(.96); }
  .ts { color: var(--muted); font-size: 11px; margin-top: 8px; }

  /* ── Ввод ── */
  footer {
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    background: var(--bg2); border-top: 1px solid var(--border);
  }
  .composer { display: flex; gap: 8px; align-items: flex-end; max-width: 760px; margin: 0 auto; }
  .composer textarea {
    flex: 1; resize: none; min-height: 46px; max-height: 140px; padding: 12px 14px;
    border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: var(--text);
    font: inherit; outline: none;
  }
  .composer textarea:focus { border-color: var(--accent); }
  .send { background: var(--accent); color: #fff; width: 46px; height: 46px; flex: none; font-size: 20px; display: grid; place-items: center; }
  .attach { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 46px; height: 46px; flex: none; font-size: 20px; display: grid; place-items: center; }
  .send:disabled { opacity: .5; }

  /* ── Оверлей перетаскивания ── */
  #drop {
    position: fixed; inset: 0; background: rgba(11,15,26,.85); z-index: 20;
    display: none; place-items: center; color: #fff; font-size: 22px; font-weight: 600;
    border: 3px dashed var(--accent); backdrop-filter: blur(2px);
  }
  #drop.show { display: grid; }

  /* ── Тост ── */
  #toast {
    position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%) translateY(20px);
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 12px; box-shadow: var(--shadow); opacity: 0;
    transition: .22s; pointer-events: none; z-index: 30; max-width: 90vw; font-size: 14px;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .hidden { display: none !important; }
</style>
</head>
<body>

  <!-- Экран входа -->
  <section id="join">
    <h1>QuickShare</h1>
    <p>Общая комната для обмена текстом, фото и файлами между устройствами.</p>
    <div class="field">
      <input id="roomInput" placeholder="КОД КОМНАТЫ" maxlength="16" autocomplete="off" autocapitalize="characters" />
    </div>
    <button class="btn block" id="joinBtn">Войти в комнату</button>
    <button class="btn ghost block" id="randomBtn" style="margin-top:10px">🎲 Создать новую</button>
    <div class="hint">Откройте один и тот же код на всех устройствах —<br />они увидят общий список.</div>
  </section>

  <!-- Приложение -->
  <div id="app" class="hidden" style="display:flex;flex-direction:column;flex:1;min-height:0">
    <header>
      <span class="dot" id="statusDot"></span>
      <span class="room" id="roomLabel"></span>
      <span class="count" id="presence"></span>
      <span class="spacer"></span>
      <button class="iconbtn" id="shareBtn" title="Поделиться ссылкой">🔗</button>
      <button class="iconbtn" id="clearBtn" title="Очистить всё">🧹</button>
      <button class="iconbtn" id="leaveBtn" title="Выйти">✕</button>
    </header>

    <main>
      <div id="list"></div>
      <div class="empty" id="empty">
        <div class="big">📋</div>
        Пусто. Отправьте текст, вставьте (Ctrl/⌘+V) или перетащите файл сюда —<br />всё появится на других устройствах.
      </div>
    </main>

    <footer>
      <div class="composer">
        <button class="attach" id="attachBtn" title="Прикрепить файл">📎</button>
        <textarea id="input" rows="1" placeholder="Введите текст или ссылку…"></textarea>
        <button class="send" id="sendBtn" title="Отправить" disabled>➤</button>
      </div>
    </footer>
  </div>

  <input type="file" id="fileInput" multiple class="hidden" />
  <div id="drop">Отпустите файл, чтобы отправить</div>
  <div id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
let ws = null, room = null, items = new Map(), reconnectT = null;

// ── Утилиты ──
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1800);
}
function fmtSize(b) {
  if (b < 1024) return b + ' Б';
  if (b < 1024 * 1024) return (b / 1024).toFixed(0) + ' КБ';
  return (b / 1024 / 1024).toFixed(1) + ' МБ';
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function linkify(s) {
  return escapeHtml(s).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function fileEmoji(mime) {
  if (mime.startsWith('image/')) return '🖼️';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime.includes('pdf')) return '📕';
  if (mime.includes('zip') || mime.includes('rar') || mime.includes('compressed')) return '🗜️';
  return '📄';
}

// ── Рендер ──
function render() {
  const list = $('#list');
  const sorted = [...items.values()].sort((a, b) => a.ts - b.ts);
  $('#empty').classList.toggle('hidden', sorted.length > 0);
  list.innerHTML = '';
  for (const it of sorted) list.appendChild(renderItem(it));
}
function renderItem(it) {
  const el = document.createElement('div');
  el.className = 'item';
  if (it.kind === 'text') {
    el.innerHTML = `
      <div class="txt">${linkify(it.text)}</div>
      <div class="actions">
        <button class="chip" data-copy>📋 Копировать</button>
        <button class="chip danger" data-del>Удалить</button>
      </div>
      <div class="ts">${fmtTime(it.ts)}</div>`;
    el.querySelector('[data-copy]').onclick = () => copyText(it.text);
  } else {
    const isImg = (it.mime || '').startsWith('image/');
    const url = `/api/${encodeURIComponent(room)}/file/${it.id}`;
    el.innerHTML = `
      <div class="row">
        <div class="fileicon">${fileEmoji(it.mime || '')}</div>
        <div class="meta">
          <div class="name">${escapeHtml(it.name)}</div>
          <div class="sub">${fmtSize(it.size)}</div>
        </div>
      </div>
      ${isImg ? `<img class="thumb" src="${url}?inline=1" loading="lazy" alt="">` : ''}
      <div class="actions">
        <a class="chip" href="${url}" download>⬇ Скачать</a>
        ${isImg ? `<button class="chip" data-copyimg>📋 Копировать</button>` : ''}
        <button class="chip danger" data-del>Удалить</button>
      </div>
      <div class="ts">${fmtTime(it.ts)}</div>`;
    const ci = el.querySelector('[data-copyimg]');
    if (ci) ci.onclick = () => copyImage(url + '?inline=1');
  }
  el.querySelector('[data-del]').onclick = () => send({ type: 'remove', id: it.id });
  return el;
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); toast('Скопировано ✓'); }
  catch { toast('Не удалось скопировать'); }
}
async function copyImage(url) {
  try {
    const blob = await (await fetch(url)).blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    toast('Картинка скопирована ✓');
  } catch { toast('Копирование картинки не поддерживается'); }
}

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?room=${encodeURIComponent(room)}`);
  ws.onopen = () => { setStatus(true); };
  ws.onclose = () => { setStatus(false); scheduleReconnect(); };
  ws.onerror = () => { try { ws.close(); } catch {} };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      items = new Map(msg.items.map((i) => [i.id, i])); render();
    } else if (msg.type === 'add') {
      items.set(msg.item.id, msg.item); render();
    } else if (msg.type === 'remove') {
      items.delete(msg.id); render();
    } else if (msg.type === 'presence') {
      $('#presence').textContent = msg.count > 1 ? `· ${msg.count} онлайн` : '';
    }
  };
}
function scheduleReconnect() {
  clearTimeout(reconnectT);
  reconnectT = setTimeout(() => { if (room) connect(); }, 1500);
}
function setStatus(on) {
  $('#statusDot').classList.toggle('on', on);
}
function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  else toast('Нет связи, переподключаюсь…');
}

// ── Отправка текста ──
function sendText() {
  const inp = $('#input');
  const text = inp.value.trim();
  if (!text) return;
  send({ type: 'text', text });
  inp.value = ''; autogrow(); updateSendBtn();
}

// ── Загрузка файлов ──
async function uploadFiles(files) {
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    toast(`Отправка «${file.name}»…`);
    try {
      const res = await fetch(`/api/${encodeURIComponent(room)}/file`, { method: 'POST', body: fd });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        toast(j.error || 'Ошибка отправки');
      }
    } catch { toast('Ошибка сети при отправке'); }
  }
}

// ── UI-обработчики ──
function autogrow() {
  const t = $('#input'); t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 140) + 'px';
}
function updateSendBtn() { $('#sendBtn').disabled = !$('#input').value.trim(); }

function enterRoom(code) {
  room = code.toUpperCase();
  localStorage.setItem('qs_room', room);
  location.hash = room;
  $('#roomLabel').textContent = room;
  $('#join').classList.add('hidden');
  $('#app').classList.remove('hidden');
  connect();
}
function leaveRoom() {
  if (ws) { try { ws.close(); } catch {} ws = null; }
  room = null; items.clear(); location.hash = '';
  $('#app').classList.add('hidden');
  $('#join').classList.remove('hidden');
}
function randomCode() {
  const a = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 5 }, () => a[Math.floor(Math.random() * a.length)]).join('');
}

// Кнопки входа
$('#joinBtn').onclick = () => {
  const v = $('#roomInput').value.trim().replace(/[^a-zA-Z0-9_-]/g, '');
  if (v) enterRoom(v); else toast('Введите код комнаты');
};
$('#randomBtn').onclick = () => { $('#roomInput').value = randomCode(); $('#joinBtn').click(); };
$('#roomInput').onkeydown = (e) => { if (e.key === 'Enter') $('#joinBtn').click(); };

// Кнопки в приложении
$('#leaveBtn').onclick = leaveRoom;
$('#clearBtn').onclick = () => { if (confirm('Очистить всё содержимое комнаты?')) send({ type: 'clear' }); };
$('#shareBtn').onclick = async () => {
  const url = location.origin + '/#' + room;
  const data = { title: 'QuickShare', text: `Комната: ${room}`, url };
  if (navigator.share) { try { await navigator.share(data); } catch {} }
  else { await copyText(url); toast('Ссылка скопирована ✓'); }
};

// Composer
$('#input').addEventListener('input', () => { autogrow(); updateSendBtn(); });
$('#input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendText(); }
});
$('#sendBtn').onclick = sendText;
$('#attachBtn').onclick = () => $('#fileInput').click();
$('#fileInput').onchange = (e) => { if (e.target.files.length) uploadFiles([...e.target.files]); e.target.value = ''; };

// Вставка из буфера (текст / картинки)
window.addEventListener('paste', (e) => {
  if (!room) return;
  const files = [...(e.clipboardData?.files || [])];
  if (files.length) { e.preventDefault(); uploadFiles(files); return; }
  // текст пусть вставляется в поле как обычно
});

// Drag & drop
let dragDepth = 0;
window.addEventListener('dragenter', (e) => { if (!room) return; e.preventDefault(); dragDepth++; $('#drop').classList.add('show'); });
window.addEventListener('dragover', (e) => { if (room) e.preventDefault(); });
window.addEventListener('dragleave', () => { if (--dragDepth <= 0) { dragDepth = 0; $('#drop').classList.remove('show'); } });
window.addEventListener('drop', (e) => {
  if (!room) return;
  e.preventDefault(); dragDepth = 0; $('#drop').classList.remove('show');
  const files = [...(e.dataTransfer?.files || [])];
  if (files.length) uploadFiles(files);
});

// Автовход по хешу/памяти
(function init() {
  const fromHash = decodeURIComponent(location.hash.slice(1)).replace(/[^a-zA-Z0-9_-]/g, '');
  const saved = fromHash || localStorage.getItem('qs_room');
  if (saved) { $('#roomInput').value = saved; enterRoom(saved); }
})();

// Регистрация PWA service worker (необязательно, для «установки» на экран)
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
